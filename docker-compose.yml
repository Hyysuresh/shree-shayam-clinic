version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: shree-ram-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: shree-ram-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: shree-ram-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin-panel:
    build:
      context: ./admin-panel
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: shree-ram-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  mongo-data:
